version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: salesradar_db
      POSTGRES_USER: salesradar
      POSTGRES_PASSWORD: salesradar7878
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image:redis: 7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
volumes:
  postgres_data:
    

    